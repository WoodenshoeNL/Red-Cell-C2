# Cargo configuration for Red-Cell-C2
#
# PyO3's build script emits -L /usr/lib/x86_64-linux-gnu to find libpython3.12,
# but that directory only ships the versioned .so.1.0 (no bare .so symlink)
# unless python3.12-dev is installed or install.sh has been run with root.
#
# The .python-lib/ directory at the workspace root contains the required
# unversioned symlink (libpython3.12.so -> /usr/lib/x86_64-linux-gnu/libpython3.12.so.1.0).
# The [build] rustflags entry below adds it to the linker search path so
# that local dev builds and CI work without needing sudo / install.sh.
#
# To use a custom Python, set PYO3_PYTHON=/path/to/python3 instead.

[build]
rustflags = ["-L", ".python-lib"]
# Cap parallelism to prevent systemd-oomd from killing the terminal scope.
# Full-parallelism cargo builds on this 8-core/16GB machine push user-slice
# memory pressure past the 50% oomd threshold for >20s.  4 jobs keeps builds
# reasonably fast while keeping peak RSS well below the kill threshold.
jobs = 4

# Parallel GNU ld (native Linux) only. mingw's `ld` used for Specter
# `x86_64-pc-windows-gnu` does not support `--threads=2` and would fail
# the link step.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-Wl,--threads=2"]

# Specter cross-compile: x86_64 Windows from Linux.
# Requires: sudo apt-get install mingw-w64
[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
