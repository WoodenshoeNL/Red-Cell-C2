# Serializes selected `red-cell` integration test binaries under cargo-nextest.
#
# Under highly parallel `cargo nextest run --workspace`, nextest can occasionally
# fail with "failed to exec test binary (ENOENT)" ([double-spawn]) when spawning
# the same integration test binary concurrently (artifact lock / race). Per-binary
# groups with `max-threads = 1` avoid concurrent exec of that binary.
#
# Add binaries here if they show the same intermittent ENOENT (see red-cell-c2-b6i4g).
# client-cli `*_contract` integration tests: red-cell-c2-0h7q9 (same double-spawn as b6i4g).

[test-groups]
assembly-dispatch-serial = { max-threads = 1 }
net-dispatch-serial = { max-threads = 1 }
output-dispatch-basic-serial = { max-threads = 1 }
output-dispatch-command-serial = { max-threads = 1 }
output-dispatch-config-serial = { max-threads = 1 }
output-dispatch-harvest-serial = { max-threads = 1 }
service-bridge-serial = { max-threads = 1 }
client-cli-contract-serial = { max-threads = 1 }
dispatch-util-serial = { max-threads = 1 }
red-cell-lib-serial = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'package(red-cell) & binary(assembly_dispatch)'
test-group = 'assembly-dispatch-serial'

[[profile.default.overrides]]
filter = 'package(red-cell) & binary(net_dispatch)'
test-group = 'net-dispatch-serial'

[[profile.default.overrides]]
filter = 'package(red-cell) & binary(output_dispatch_basic)'
test-group = 'output-dispatch-basic-serial'

[[profile.default.overrides]]
filter = 'package(red-cell) & binary(output_dispatch_command)'
test-group = 'output-dispatch-command-serial'

[[profile.default.overrides]]
filter = 'package(red-cell) & binary(output_dispatch_config)'
test-group = 'output-dispatch-config-serial'

[[profile.default.overrides]]
filter = 'package(red-cell) & binary(output_dispatch_harvest)'
test-group = 'output-dispatch-harvest-serial'

[[profile.default.overrides]]
filter = 'package(red-cell) & binary(service_bridge)'
test-group = 'service-bridge-serial'

[[profile.default.overrides]]
filter = 'package(red-cell-cli) & binary(audit_api_contract)'
test-group = 'client-cli-contract-serial'

[[profile.default.overrides]]
filter = 'package(red-cell-cli) & binary(agent_api_contract)'
test-group = 'client-cli-contract-serial'

[[profile.default.overrides]]
filter = 'package(red-cell-cli) & binary(session_api_contract)'
test-group = 'client-cli-contract-serial'

[[profile.default.overrides]]
filter = 'package(red-cell-cli) & binary(payload_api_contract)'
test-group = 'client-cli-contract-serial'

[[profile.default.overrides]]
filter = 'package(red-cell-cli) & binary(operator_api_contract)'
test-group = 'client-cli-contract-serial'

[[profile.default.overrides]]
filter = 'package(red-cell) & test(dispatch::util::tests)'
test-group = 'dispatch-util-serial'

[[profile.default.overrides]]
filter = 'binary_id(red-cell)'
test-group = 'red-cell-lib-serial'
